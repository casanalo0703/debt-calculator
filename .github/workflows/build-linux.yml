name: Build Linux Application

permissions:
  contents: write
  packages: write

on:
  push:
    branches:
      - main
    tags:
      - "*"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xfixes0 libxcb-shape0 libdbus-1-3

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Linux application
        run: |
          make release-linux

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Calculadora_de_Deudas_Linux
          path: dist/Calculadora_de_Deudas_Linux.tar.gz
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/Calculadora_de_Deudas_Linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
